<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  :root{
    --bg0:#051019;
    --bg1:#081a33;
    --bg2:#0f3a22;
    --panel:#0d1724e6;
    --panel2:#101c2c;
    --border:#28435f;
    --text:#f7fbff;
    --muted:#aab7c8;
    --blue:#1f4e8f;
    --red:#d83b45;
    --white:#f6f8fb;
    --green:#1fa54a;
    --gold:#f4c94f;
    --danger:#ff7480;
    --shadow:0 24px 80px rgba(0,0,0,.45);
    --radius:24px;
  }

  *{box-sizing:border-box;}
  html,body{height:100%; margin:0;}
  body{
    padding:24px;
    color:var(--text);
    font-family:"Segoe UI Variable","Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(31,78,143,.28), transparent 30%),
      radial-gradient(circle at top right, rgba(216,59,69,.18), transparent 24%),
      radial-gradient(circle at bottom left, rgba(31,165,74,.18), transparent 28%),
      linear-gradient(180deg, var(--bg1), var(--bg0) 72%, var(--bg2));
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .app{
    width:min(1180px, 100%);
    min-height:calc(100vh - 48px);
    margin:0 auto;
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:18px;
    outline:none;
  }

  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    position:relative;
    padding:2px 2px 0;
  }

  .topbar::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-10px;
    height:2px;
    background:linear-gradient(90deg, var(--red), var(--white), var(--blue), var(--green));
    opacity:.95;
  }

  .brand{display:flex; flex-direction:column; gap:6px;}
  .eyebrow{
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#dfe8f2;
    opacity:.82;
  }
  h1{
    margin:0;
    font-size:clamp(28px, 4vw, 48px);
    line-height:1;
    letter-spacing:-.04em;
  }
  .status{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:10px;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:rgba(16, 27, 40, .72);
    border:1px solid rgba(40, 67, 95, .95);
    color:var(--white);
    font-size:13px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    backdrop-filter:blur(16px);
  }
  .pill strong{
    background:linear-gradient(90deg, var(--blue), var(--green));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .nav-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .menu-btn{
    flex:1 1 180px;
    appearance:none;
    border:1px solid #2b4159;
    background:linear-gradient(180deg, #172637, #101a28);
    color:var(--text);
    border-radius:16px;
    padding:18px 18px;
    min-height:112px;
    cursor:pointer;
    font:inherit;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:transform .14s ease, border-color .14s ease, background .14s ease;
    position:relative;
  }
  .menu-btn:hover{
    transform:translateY(-1px);
    border-color:#4d6885;
    background:linear-gradient(180deg, #1c3046, #132131);
  }
  .menu-btn.active{
    border-color:rgba(31,78,143,.7);
    box-shadow:0 0 0 1px rgba(31,78,143,.15) inset;
  }
  .menu-btn .label{
    font-weight:700;
    font-size:20px;
    letter-spacing:-.02em;
    text-align:center;
  }
  .menu-btn .hint{
    font-size:13px;
    color:var(--muted);
    text-align:center;
    max-width:140px;
    line-height:1.35;
  }
  .menu-btn .chev{
    color:var(--green);
    font-size:20px;
    line-height:1;
    opacity:.9;
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
  }

  .panel{
    background:var(--panel);
    border:1px solid rgba(40,67,95,.92);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
    overflow:hidden;
    min-height:0;
  }

  .view{display:none; height:100%; min-height:0;}
  .view.active{display:flex;}
  .home-view, .settings-view, .exit-view{padding:22px;}

  .layout{
    display:grid;
    grid-template-columns:1fr 310px;
    gap:18px;
    width:100%;
    min-height:0;
  }

  .screen,
  .sidebar-card,
  .settings-card,
  .exit-card{
    border-radius:22px;
    background:
      linear-gradient(180deg, rgba(20, 32, 49, .95), rgba(12, 20, 31, .98)),
      linear-gradient(90deg, rgba(216,59,69,.06), rgba(255,255,255,.03), rgba(31,165,74,.06));
    border:1px solid rgba(40,67,95,.92);
  }

  .screen{
    padding:18px;
    min-height:180px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:14px;
  }
  .screen-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    color:var(--muted);
    font-size:12px;
  }
  .screen-top strong{color:var(--white);}
  .expr{
    min-height:42px;
    font-size:clamp(20px, 3vw, 30px);
    line-height:1.25;
    letter-spacing:-.03em;
    word-break:break-all;
  }
  .result{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .result .label{color:var(--muted); font-size:13px;}
  .result .value{
    font-size:clamp(34px, 5vw, 54px);
    line-height:1;
    letter-spacing:-.05em;
    color:var(--green);
    font-weight:700;
    word-break:break-all;
  }

  .keypad{
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:10px;
    margin-top:14px;
  }
  .key{
    appearance:none;
    border:1px solid #2b3f55;
    background:linear-gradient(180deg, #17253a, #101b29);
    color:var(--text);
    border-radius:18px;
    min-height:64px;
    padding:14px;
    font:inherit;
    font-size:18px;
    cursor:pointer;
    transition:transform .14s ease, border-color .14s ease, background .14s ease;
  }
  .key:hover{
    transform:translateY(-1px);
    border-color:#55738f;
    background:linear-gradient(180deg, #1d3148, #152233);
  }
  .key.operator{
    color:var(--white);
    border-color:rgba(79,163,255,.32);
    background:linear-gradient(180deg, rgba(31,78,143,.36), rgba(20,32,49,.98));
  }
  .key.emphasis{
    color:#06131d;
    background:linear-gradient(180deg, #ffffff, #dbefff);
    border-color:transparent;
    font-weight:700;
  }
  .key.warning{
    color:#201608;
    background:linear-gradient(180deg, #ffe27a, #f3c245);
    border-color:transparent;
    font-weight:700;
  }
  .key.wide{grid-column:span 2;}

  .history{
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:0;
  }
  .history h3{
    margin:0;
    font-size:14px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .history-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow:auto;
    min-height:0;
  }
  .history-item{
    padding:12px;
    border-radius:16px;
    background:rgba(14,22,34,.84);
    border:1px solid rgba(40,67,95,.8);
  }
  .history-item .expr-line{
    color:var(--text);
    font-size:13px;
    word-break:break-all;
    line-height:1.45;
  }
  .history-item .res-line{
    margin-top:4px;
    color:var(--green);
    font-size:12px;
  }

  .sidebar-card,
  .settings-card,
  .exit-card{
    padding:18px;
  }

  .settings-grid{
    display:grid;
    grid-template-columns:minmax(0, 1.2fr) minmax(280px, .8fr);
    gap:16px;
  }

  .mini-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:10px;
    margin-top:12px;
  }

  .mini-btn{
    appearance:none;
    border:1px solid rgba(58,78,100,.95);
    background:linear-gradient(180deg, rgba(23,37,58,.98), rgba(16,27,41,.98));
    color:var(--text);
    border-radius:16px;
    min-height:62px;
    padding:12px 14px;
    font:inherit;
    cursor:pointer;
    display:grid;
    place-items:center;
    font-size:20px;
    font-weight:700;
    letter-spacing:-.03em;
    transition:transform .14s ease, border-color .14s ease, background .14s ease;
  }
  .mini-btn:hover{
    border-color:#50718f;
    background:linear-gradient(180deg, rgba(31,78,143,.16), rgba(16,27,41,.98));
    transform:translateY(-1px);
  }
  .mini-btn .mini-value{color:var(--green);}

  .settings-card{
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-height:320px;
    text-align:center;
    padding:24px;
  }

  .settings-card p{
    margin:0 auto 18px;
    max-width:28ch;
    font-size:18px;
    line-height:1.5;
    color:var(--white);
  }

  .settings-card .draft{
    margin-top:0;
    font-size:28px;
    min-height:76px;
    display:grid;
    place-items:center;
  }

  .settings-card .shortcuts{
    justify-content:center;
    margin-top:16px;
  }

  .sidebar-card{
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-height:320px;
    text-align:center;
    padding:24px;
  }

  .sidebar-card h3{
    margin:0 0 10px;
    font-size:15px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
  }

  .sidebar-card .history-list,
  .sidebar-card .mini-grid{
    margin-top:14px;
  }

  .exit-card{
    min-height:280px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:28px;
  }

  .exit-card p{
    margin:0;
    font-size:20px;
    line-height:1.5;
    max-width:22ch;
    color:var(--white);
  }

  .exit-card .shortcuts{
    justify-content:center;
  }
  .section-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin:0 0 16px;
  }
  .section-title h2{
    margin:0;
    font-size:20px;
    letter-spacing:-.02em;
  }
  .section-title .meta{
    color:var(--muted);
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .shortcuts{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
  }
  .shortcut{
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(58,78,100,.95);
    color:var(--text);
    background:linear-gradient(180deg, rgba(31,78,143,.10), rgba(31,165,74,.08));
    font-size:12px;
  }
  .shortcut strong{color:var(--blue);}

  .draft{
    margin-top:16px;
    font-size:20px;
    padding:16px;
    border-radius:18px;
    background:rgba(10,18,28,.78);
    border:1px dashed rgba(79,163,255,.34);
    min-height:60px;
    word-break:break-all;
  }

  .toast{
    margin-top:12px;
    padding:12px 14px;
    border-radius:16px;
    border:1px solid rgba(243,198,78,.28);
    background:rgba(243,198,78,.08);
    color:#ffe8a3;
    font-size:13px;
    line-height:1.45;
  }
  .toast.error{
    border-color:rgba(255,116,128,.28);
    background:rgba(255,116,128,.10);
    color:#ffd8dc;
  }
  .toast.success{
    border-color:rgba(31,165,74,.28);
    background:rgba(31,165,74,.10);
    color:#d4f5df;
  }

  .footer{
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:center;
    color:var(--muted);
    font-size:12px;
    padding:0 4px;
  }
  .footer .note{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .dot{
    width:8px;
    height:8px;
    border-radius:999px;
    background:linear-gradient(180deg, var(--red), var(--green));
    box-shadow:0 0 0 0 rgba(31,165,74,.55);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(31,165,74,.45);}
    70%{box-shadow:0 0 0 10px rgba(31,165,74,0);}
    100%{box-shadow:0 0 0 0 rgba(31,165,74,0);}
  }

  @media (max-width: 1020px){
    .layout{grid-template-columns:1fr;}
  }
  @media (max-width: 760px){
    body{padding:12px;}
    .app{min-height:calc(100vh - 24px);}
    .topbar{align-items:flex-start; flex-direction:column;}
    .status{justify-content:flex-start;}
    .menu-btn{flex-basis:100%;}
    .settings-grid{grid-template-columns:1fr;}
    .mini-grid{grid-template-columns:repeat(2, minmax(0, 1fr));}
    .settings-card,
    .sidebar-card,
    .exit-card{min-height:unset; text-align:left;}
    .settings-card .shortcuts,
    .exit-card .shortcuts{justify-content:flex-start;}
    .home-view, .settings-view, .exit-view{padding:16px;}
    .key{min-height:58px; border-radius:16px; font-size:17px;}
  }
</style>
</head>
<body>
<div class="app" id="app" tabindex="0" aria-label="Calculator application">
  <header class="topbar">
    <div class="brand">
      <div class="eyebrow">University calculator project</div>
      <h1>Calculator</h1>
    </div>
    <div class="status">
      <div class="pill">Keyboard <strong>enabled</strong></div>
      <div class="pill">Decimals: <strong id="decimalsBadge">2</strong></div>
      <div class="pill">View: <strong id="viewBadge">Home</strong></div>
    </div>
  </header>

  <div class="nav-actions" id="navActions"></div>

  <main class="panel" id="panel" role="main" aria-live="polite"></main>

  <footer class="footer">
    <div class="note"><span class="dot"></span><span>Built as a university project. Keyboard and mouse stay in sync.</span></div>
    <div>Esc returns to Home from Calculator or Settings.</div>
  </footer>
</div>

<script>
  const app = document.getElementById('app');
  const panel = document.getElementById('panel');
  const navActions = document.getElementById('navActions');
  const decimalsBadge = document.getElementById('decimalsBadge');
  const viewBadge = document.getElementById('viewBadge');

  const state = {
    view: 'home',
    decimals: 2,
    expression: '',
    history: [],
    draft: '2',
    message: '',
    messageType: 'info',
  };

  const navItems = [
    { label: 'Calculator', hint: 'Open calculator', view: 'home' },
    { label: 'Settings', hint: 'Set decimals', view: 'settings' },
    { label: 'Exit', hint: 'Show exit screen', view: 'exit' }
  ];

  function escapeHtml(value){
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function updateStatus(){
    decimalsBadge.textContent = String(state.decimals);
    viewBadge.textContent = state.view.charAt(0).toUpperCase() + state.view.slice(1);
  }

  function setMessage(text, type = 'info'){
    state.message = text;
    state.messageType = type;
    render();
  }

  function clearMessage(){
    state.message = '';
    render();
  }

  function renderNav(){
    navActions.innerHTML = navItems.map(item => `
      <button class="menu-btn${state.view === item.view ? ' active' : ''}" data-view="${item.view}" type="button" aria-label="${item.label}">
        <span>
          <div class="label">${item.label}</div>
          <div class="hint">${item.hint}</div>
        </span>
        <span class="chev">›</span>
      </button>
    `).join('');
  }

  function formatNumber(value){
    if (!Number.isFinite(value)) return 'Error';
    const rounded = Number(value.toFixed(state.decimals));
    return rounded.toFixed(state.decimals);
  }

  function normalizeExpression(expr){
    return expr
      .replaceAll('×', '*')
      .replaceAll('÷', '/')
      .replaceAll('−', '-')
      .replace(/\s+/g, '');
  }

  function tryEvaluate(expr){
    const normalized = normalizeExpression(expr);
    if (!normalized) return null;
    if (!/^[0-9+\-*/%().]+$/.test(normalized)) return null;
    if (/^[+/*%]/.test(normalized)) return null;
    if (/[+\-*/%.]$/.test(normalized)) return null;
    try{
      const result = Function('"use strict"; return (' + normalized + ');')();
      if (!Number.isFinite(result)) return null;
      return result;
    }catch{
      return null;
    }
  }

  function currentSegment(expr){
    const match = expr.match(/(?:^|[+\-*/%()])([0-9.]+)$/);
    return match ? match[1] : expr;
  }

  function isOperator(ch){
    return ['+', '-', '*', '/', '%'].includes(ch);
  }

  function livePreview(){
    const expr = state.expression.trim();
    if (!expr) return '0';
    const value = tryEvaluate(expr);
    if (value === null) return 'Ready';
    return formatNumber(value);
  }

  function renderHome(){
    return `
      <section class="view home-view active">
        <div class="layout">
          <div>
            <div class="screen">
              <div class="screen-top">
                <div><strong>Home</strong></div>
                <div>Type numbers or tap keys</div>
              </div>
              <div class="expr" aria-label="Expression">${escapeHtml(state.expression || '0')}</div>
              <div class="result">
                <div class="label">Result</div>
                <div class="value">${escapeHtml(livePreview())}</div>
              </div>
            </div>

            ${state.message ? `<div class="toast ${state.messageType}">${escapeHtml(state.message)}</div>` : ''}

            <div class="keypad" aria-label="Calculator keypad">
              <button type="button" class="key warning" data-action="clear">C</button>
              <button type="button" class="key" data-action="backspace">DEL</button>
              <button type="button" class="key operator" data-token="%">%</button>
              <button type="button" class="key operator" data-token="/">/</button>

              <button type="button" class="key" data-token="7">7</button>
              <button type="button" class="key" data-token="8">8</button>
              <button type="button" class="key" data-token="9">9</button>
              <button type="button" class="key operator" data-token="*">*</button>

              <button type="button" class="key" data-token="4">4</button>
              <button type="button" class="key" data-token="5">5</button>
              <button type="button" class="key" data-token="6">6</button>
              <button type="button" class="key operator" data-token="-">-</button>

              <button type="button" class="key" data-token="1">1</button>
              <button type="button" class="key" data-token="2">2</button>
              <button type="button" class="key" data-token="3">3</button>
              <button type="button" class="key operator" data-token="+">+</button>

              <button type="button" class="key wide" data-token="0">0</button>
              <button type="button" class="key" data-token=".">.</button>
              <button type="button" class="key emphasis" data-action="evaluate">=</button>
            </div>
          </div>

          <aside class="sidebar-card">
            <h3>History</h3>
            <div class="history-list">${renderHistory()}</div>
          </aside>
        </div>
      </section>
    `;
  }

  function renderHistory(){
    if (state.history.length === 0){
      return `<div class="history-item"><div class="expr-line">No calculations yet.</div><div class="res-line">Enter a sum to begin.</div></div>`;
    }
    return state.history.slice().reverse().map(entry => `
      <div class="history-item">
        <div class="expr-line">${escapeHtml(entry.expr)}</div>
        <div class="res-line">= ${escapeHtml(entry.result)}</div>
      </div>
    `).join('');
  }

  function renderSettings(){
    return `
      <section class="view settings-view active">
        <div style="max-width:980px;">
          <div class="section-title">
            <h2>Settings</h2>
            <div class="meta">Decimals</div>
          </div>

          <div class="settings-grid">
            <div class="settings-card">
              <p>Set how many decimal places the calculator shows.</p>
              <div class="draft" aria-label="Decimal draft">${escapeHtml(state.draft || '') || '0 to 9'}</div>
              <div class="shortcuts">
                <span class="shortcut"><strong>Enter</strong> Apply</span>
                <span class="shortcut"><strong>Esc</strong> Home</span>
                <span class="shortcut"><strong>Backspace</strong> Delete</span>
              </div>
              ${state.message ? `<div class="toast ${state.messageType}">${escapeHtml(state.message)}</div>` : ''}
            </div>

            <div class="sidebar-card">
              <h3>Quick picks</h3>
              <div class="mini-grid">
                ${[0,2,3,4,6,9].map(v => `
                  <button type="button" class="mini-btn" data-preset="${v}">
                    <span class="mini-value">${v}</span>
                  </button>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  function renderExit(){
    return `
      <section class="view exit-view active">
        <div style="max-width:860px;">
          <div class="section-title">
            <h2>Exit</h2>
            <div class="meta">Session end</div>
          </div>

          <div class="exit-card">
            <p>Use Restart to return home.</p>
            <div class="shortcuts">
              <span class="shortcut"><strong>Enter</strong> Restart</span>
              <span class="shortcut"><strong>Esc</strong> Home</span>
            </div>
            ${state.message ? `<div class="toast ${state.messageType}">${escapeHtml(state.message)}</div>` : ''}
          </div>
        </div>
      </section>
    `;
  }

  function render(){
    updateStatus();
    renderNav();
    if (state.view === 'home'){
      panel.innerHTML = renderHome();
    } else if (state.view === 'settings'){
      panel.innerHTML = renderSettings();
    } else if (state.view === 'exit'){
      panel.innerHTML = renderExit();
    }
    app.focus({ preventScroll: true });
  }

  function setView(view){
    state.view = view;
    if (view === 'settings') state.draft = String(state.decimals);
    render();
  }

  function appendToken(token){
    clearMessage();
    if (state.view !== 'home') return;

    let expr = state.expression || '';
    if (!expr && /^[+*/%]$/.test(token)) expr = '0';
    if (!expr && token === '.') expr = '0';

    const last = expr.slice(-1);
    if (isOperator(token) && isOperator(last)){
      expr = expr.slice(0, -1) + token;
    } else if (token === '.' && currentSegment(expr).includes('.')){
      return;
    } else {
      expr += token;
    }

    state.expression = expr;
    render();
  }

  function evaluateExpression(){
    if (state.view !== 'home') return;
    const result = tryEvaluate(state.expression);
    if (result === null){
      setMessage('Enter a valid expression before pressing equals.', 'error');
      return;
    }
    const output = formatNumber(result);
    state.history.push({ expr: state.expression, result: output });
    state.expression = output;
    setMessage(`Success: ${output}`, 'success');
  }

  function clearExpression(){
    if (state.view === 'home'){
      state.expression = '';
      clearMessage();
    } else if (state.view === 'settings'){
      state.draft = '';
      clearMessage();
    }
    render();
  }

  function backspace(){
    if (state.view === 'home'){
      state.expression = state.expression.slice(0, -1);
      clearMessage();
      render();
    } else if (state.view === 'settings'){
      state.draft = state.draft.slice(0, -1);
      clearMessage();
      render();
    }
  }

  function applySettingsDraft(){
    const value = Number.parseInt(state.draft, 10);
    if (!Number.isInteger(value)){
      setMessage('Enter a whole number between 0 and 9.', 'error');
      return;
    }
    if (value < 0 || value > 9){
      setMessage('Decimal places must be between 0 and 9.', 'error');
      return;
    }
    state.decimals = value;
    setMessage(`Settings updated. Decimal places set to ${value}.`, 'success');
    setView('home');
  }

  function handleGlobalShortcut(key){
    if (state.view === 'settings'){
      if (/^\d$/.test(key)){
        state.draft = (state.draft === '0') ? key : (state.draft || '') + key;
        render();
        return true;
      }
      if (key === 'Backspace'){ backspace(); return true; }
      if (key === 'Enter'){ applySettingsDraft(); return true; }
      if (key === 'Escape'){ setView('home'); return true; }
      return false;
    }

    if (state.view === 'exit'){
      if (key === 'Enter' || key === '1' || key === 'Escape'){ setView('home'); return true; }
      if (key === '2'){ setView('settings'); return true; }
      if (key === '3'){ setView('exit'); return true; }
      return false;
    }

    if (/^\d$/.test(key) || ['+', '-', '*', '/', '%', '.', '(', ')'].includes(key)){
      appendToken(key);
      return true;
    }
    if (key === 'Enter' || key === '='){ evaluateExpression(); return true; }
    if (key === 'Backspace'){ backspace(); return true; }
    if (key === 'Delete' || key.toLowerCase() === 'c'){ clearExpression(); return true; }
    if (key === 'Escape'){ setView('home'); return true; }
    if (key === '2'){ setView('settings'); return true; }
    if (key === '3'){ setView('exit'); return true; }
    return false;
  }

  panel.addEventListener('click', (event) => {
    const target = event.target.closest('[data-view], [data-action], [data-token], [data-preset]');
    if (!target) return;

    const view = target.dataset.view;
    const action = target.dataset.action;
    const token = target.dataset.token;
    const preset = target.dataset.preset;

    if (view){
      setView(view);
      return;
    }

    if (action === 'clear'){ clearExpression(); return; }
    if (action === 'backspace'){ backspace(); return; }
    if (action === 'evaluate'){ evaluateExpression(); return; }
    if (token) appendToken(token);
    if (preset !== undefined){
      state.draft = String(preset);
      render();
    }
  });

  navActions.addEventListener('click', (event) => {
    const target = event.target.closest('[data-view]');
    if (!target) return;
    setView(target.dataset.view);
  });

  document.addEventListener('keydown', (event) => {
    if (event.metaKey || event.ctrlKey || event.altKey) return;
    const handled = handleGlobalShortcut(event.key);
    if (handled) event.preventDefault();
  });

  setView('home');
</script>
</body>
</html>
